name: Deploy Hub Cluster

permissions:
  contents: read

concurrency:
  group: deploy-l1-cp-hub
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      ocp_version:
        description: "OpenShift version (e.g., 4.22.0-rc.3)"
        required: true
        default: "4.22.0-rc.3"
      registry_url:
        description: "AirGapped Registry URL"
        required: true
        default: "infra.5g-deployment.lab:8443"
      remote_host:
        description: "Remote host for seed VM (optional)"
        required: false
        default: ""
      vm_name:
        description: "Seed VM name (optional)"
        required: false
        default: "sno1"
      argocd_app: 
        description: "ArgoCD application name (e.g., rds-hub-operators-argoapps.yaml)"
        required: true
        default: "rds-hub-operators-argoapps.yaml"
      day2-catalogsource:
        description: "Optional operator index image for imageset-config (overrides default registry.redhat.io/redhat/redhat-operator-index:v4.22)"
        required: false
        type: string
        default: ""
      platform_channel:
        description: "OCP platform channel for imageset-config (e.g. candidate-4.22 or stable-4.22). Leave empty to auto-select from OCP_VERSION."
        required: false
        type: string
        default: ""
defaults:
  run:
    shell: bash

env:
  # Opt into Node.js 24 for JavaScript actions (e.g. actions/checkout@v6); avoids Node 20 deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OCP_VERSION: ${{ github.event.inputs.ocp_version }}
  REGISTRY_URL: ${{ github.event.inputs.registry_url }}
  REMOTE_HOST: ${{ github.event.inputs.remote_host }}
  VM_NAME: ${{ github.event.inputs.vm_name }}
  KUBECONFIG_PATH: ${{ github.workspace }}/hub/auth/kubeconfig
  ARGOCD_APP: ${{ github.event.inputs.argocd_app }}
  
jobs:

  clean-hub:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 90
    env:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

    steps:
      - name: 🧹 Fix workspace ownership (prevents EACCES)
        run: |
          sudo chown -R $(whoami):$(whoami) "${GITHUB_WORKSPACE}/"

      - uses: actions/checkout@v6
        with:
          repository: midu16/l1-cp
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: true
          persist-credentials: true
          fetch-depth: 1
          fetch-tags: false
          submodules: false
          lfs: false
          set-safe-directory: true

      - name: 🧹 Safe workspace cleanup (extra precaution)
        run: |
          git -C "${GITHUB_WORKSPACE}/l1-cp" reset --hard || true
          git -C "${GITHUB_WORKSPACE}/l1-cp" clean -fdx || true

      - name: 🗑️ Clean up previous RHACM Virtual Hub
        run: |
          if sudo kcli list plan | grep -q "hub "; then
            echo "Deleting hub plan on local host..."
            sudo kcli delete plan hub -y
          else
            echo "Plan hub does not exist on local host — skipping."
          fi
          if sudo ssh root@INBACRNRDL0103 'sudo kcli list plan | grep -q "hub "'; then
            echo "Deleting hub plan on remote INBACRNRDL0103..."
            sudo ssh root@INBACRNRDL0103 'sudo kcli delete plan hub -y'
          else
            echo "Plan hub does not exist on remote — skipping."
          fi

      - name: 🗑️ Clean up old registry content
        run: sudo rm -rf /home/registry/data/docker || true

      - name: 🗑️ Clean oc-mirror cache
        run: sudo rm -rf /root/.oc-mirror/.cache || true

      - name: 🗑️ Clean podman unused images
        run: sudo podman system prune -a || true

      - name: 🔄 Restart podman-registry
        run: |
          sudo systemctl restart podman-registry.service
          sudo systemctl status podman-registry.service || true

      - name: 🧹 Remove remote Seed VM (if provided)
        if: env.REMOTE_HOST != ''
        run: |
          REMOTE="${REMOTE_HOST}"
          VM="${VM_NAME}"
          SSH_TIMEOUT=30

          echo "Cleaning Seed VM: $VM on $REMOTE"

          if ! timeout $SSH_TIMEOUT ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$REMOTE" true 2>/dev/null; then
            echo "⚠️ Could not SSH to $REMOTE — skipping VM cleanup"
            exit 0
          fi

          if ssh "$REMOTE" "kcli list vm | grep -q '^$VM'"; then
            echo "Deleting VM $VM ..."
            ssh "$REMOTE" "kcli delete vm $VM -y" || true
          else
            echo "ℹ️ VM $VM not found on remote host"
          fi

  build-hub:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 90
    needs: clean-hub
    env:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REPO_PATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v6

      - name: 📥 Download OCP tools
        run: sudo make download-oc-tools VERSION="${OCP_VERSION}"

      - name: 📝 Render imageset-config.yml
        env:
          DAY2_CATALOGSOURCE: ${{ github.event.inputs['day2-catalogsource'] }}
          PLATFORM_CHANNEL: ${{ github.event.inputs.platform_channel }}
        run: |
          if [[ -n "${DAY2_CATALOGSOURCE}" ]]; then
            export SOURCE_INDEX="${DAY2_CATALOGSOURCE}"
            echo "Using day2-catalogsource (SOURCE_INDEX): ${SOURCE_INDEX}"
          else
            export SOURCE_INDEX="registry.redhat.io/redhat/redhat-operator-index:v4.22"
            echo "Using default SOURCE_INDEX: ${SOURCE_INDEX}"
          fi
          sudo -E env \
            DOCKER_CONFIG=/root/.docker \
            OC_MIRROR="${GITHUB_WORKSPACE}/bin/oc-mirror" \
            PLATFORM_CHANNEL="${PLATFORM_CHANNEL}" \
            make imageset-config.yml OCP_VERSION="${OCP_VERSION}" SOURCE_INDEX="${SOURCE_INDEX}"
          echo "Generated platform/operator pins:"
          grep -E 'name: (candidate|stable)-4\.22|minVersion|maxVersion' imageset-config.yml | head -40
          PLATFORM_CH=$(awk '/platform:/{p=1} p && /- name:/{print $3; exit}' imageset-config.yml)
          OCP_PIN=$(awk '/minVersion:/{print $2; exit}' imageset-config.yml | tr -d "'")
          echo "Platform channel: ${PLATFORM_CH}, pinned OCP: ${OCP_PIN}"

      - name: 🔍 Validate AirGapped registry catalog
        run: |
          curl -sk -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
            "https://${REGISTRY_URL}/v2/_catalog" | jq . || echo "⚠️ Registry check failed"

      - name: ⚙️ Prepare install-config
        run: |
          sudo make fetch-certificate REGISTRY_URL="${REGISTRY_URL}"
          sudo make registry-pull-secret USERNAME="${REGISTRY_USERNAME}" PASSWORD="${REGISTRY_PASSWORD}" REGISTRY_URL="${REGISTRY_URL}"
          sudo make update-sshkey SSHKEY_FILE="/root/.ssh/id_rsa.pub"

      - name: 📦 Mirror images to AirGapped registry
        run: |
          max_attempts=5
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "::group::Mirror attempt $attempt of $max_attempts"
            if sudo DOCKER_CONFIG=/root/.docker ./bin/oc-mirror -c imageset-config.yml --v2 \
              --workspace file://hub-demo/ \
              docker://"${REGISTRY_URL}"/hub-demo \
              --max-nested-paths 10 --parallel-images 10 --parallel-layers 10 \
              --dest-tls-verify=false --log-level debug; then
              echo "::endgroup::"
              echo "Mirror completed successfully on attempt $attempt."
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt/$max_attempts failed."
            if [ $attempt -lt $max_attempts ]; then
              echo "Retrying in 30 seconds..."
              sleep 30
            fi
            attempt=$((attempt + 1))
          done
          echo "Mirror failed after $max_attempts attempts."
          exit 1

      - name: 🔍 Verify AirGapped registry content after mirroring
        run: |
          curl -sk -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
              "https://${REGISTRY_URL}/v2/_catalog" | jq . || echo "⚠️ Registry check failed"

      - name: 📋 Sync oc-mirror IDMS into workingdir
        run: |
          make sync-oc-mirror-manifests OC_MIRROR_WORKSPACE=hub-demo REGISTRY_URL="${REGISTRY_URL}"
          echo "IDMS preview (ODF/GitOps supplement entries):"
          grep -E 'rhceph-9-rhel9|argocd-rhel9|odf-blackbox-exporter-rhel9' workingdir/openshift/idms-oc-mirror.yaml | head -20

      - name: 🔧 Generate openshift-install binary
        run: sudo make generate-openshift-install \
          RELEASE_IMAGE="${REGISTRY_URL}/hub-demo/openshift/release-images:${OCP_VERSION}-x86_64"

      - name: 💿 Generate agent ISO
        run: |
          sudo make create-agent-iso \
            OCP_VERSION="${OCP_VERSION}" \
            REGISTRY_URL="${REGISTRY_URL}"
          sudo chown -R "$(whoami):$(whoami)" ./hub/ ./workingdir/
          ls -la ./hub/agent*.iso

      - name: 🔎 Verify agent install mirror config
        run: |
          INSTALL_CONFIG="./workingdir/install-config.yaml"
          if [ ! -f "$INSTALL_CONFIG" ] && [ -f ./hub/install-config.yaml.bak ]; then
            INSTALL_CONFIG="./hub/install-config.yaml.bak"
          fi
          grep -A12 'imageDigestSources:' "$INSTALL_CONFIG" | head -15
          if grep -q 'imageContentSources:' "$INSTALL_CONFIG"; then
            echo "❌ install-config still uses deprecated imageContentSources"
            exit 1
          fi
          echo "✅ install-config uses imageDigestSources"

      - name: 📤 Copy agent ISO to webcache
        run: |
          SRC=$(ls hub/agent*.iso | head -n1 || true)
          if [[ -z "$SRC" ]]; then
            echo "❌ No agent ISO found"; exit 1
          fi
          sudo cp "$SRC" /opt/webcache/data/agent.x86_64.iso
          echo "✅ Copied $SRC to /opt/webcache/data/"

      - name: 🖥️ Create Hub VMs
        run: |
          for i in 0 1 2; do
            MAC="aa:aa:aa:aa:01:0$((i+1))"
            UUID="aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaa010$((i+1))"
            sudo kcli create vm \
              -P start=True -P uefi_legacy=true -P plan=hub \
              -P memory=71680 -P numcpus=40 -P disks=[200,50,250] \
              -P nets="[{'name': 'br0', 'mac': '$MAC'}]" \
              -P uuid="$UUID" \
              -P name="hub-ctlplane-$i" \
              -P iso=/opt/webcache/data/agent.x86_64.iso
          done

      - name: ⏱️ Wait for installation to complete
        run: |
          RELEASE_IMAGE="${REGISTRY_URL}/hub-demo/openshift/release-images:${OCP_VERSION}-x86_64"
          RELEASE_DIGEST=$(sudo ./bin/oc adm release info "${RELEASE_IMAGE}" \
            --registry-config=/root/.docker/config.json --insecure=true \
            -o jsonpath='{.digest}')
          export OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE="${REGISTRY_URL}/hub-demo/openshift/release-images@${RELEASE_DIGEST}"
          echo "OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE=${OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE}"
          sudo -E ./bin/openshift-install --dir ./hub/ agent wait-for install-complete --log-level=info

      - name: ⏱️ Wait for Cluster Operators
        run: sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" wait --for=condition=Available clusteroperators --all --timeout=1800s

      - name: 🚨 Validate no degraded operators
        run: |
          degraded=$(sudo oc --kubeconfig="${KUBECONFIG_PATH}" get clusteroperators -o json | jq -r '.items[] | select(.status.conditions[] | select(.type=="Degraded" and .status=="True")) | .metadata.name')
          if [[ -n "$degraded" ]]; then
            echo "❌ Degraded operators detected: $degraded"
            exit 1
          fi
          echo "✅ No degraded Operators"

      - name: 📋 Print final Operator status
        run: sudo oc --kubeconfig="${KUBECONFIG_PATH}" get clusteroperators
      - name: 📋 Move kubeconfig to /root/.kcli/clusters/hub/auth/ path
        run: |
          sudo mkdir -p /root/.kcli/clusters/hub/auth/
          sudo rsync -a --inplace "${KUBECONFIG_PATH}" /root/.kcli/clusters/hub/auth/kubeconfig
      - name: ✅ Approve all InstallPlans
        run: |
          sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" get installplan -A -o json | \
            jq -r '.items[] | select(.spec.approved != true) | "\(.metadata.namespace) \(.metadata.name)"' | \
            while read -r ns name; do
              echo "Approving InstallPlan $name in namespace $ns"
              sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" -n "$ns" patch installplan "$name" --type merge -p '{"spec":{"approved":true}}'
            done
          echo "✅ InstallPlan approval complete"

      - name: 🔐 Grant Argo CD cluster-admin for operator PreSync hooks
        run: |
          sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" apply -f "${REPO_PATH}/hub-config/operators-config/05_gitopsServiceClusterConfig.yaml"

      - name: 📋 Hub Argo Application
        run: |
          sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" apply -f "${REPO_PATH}/hub-config/${ARGOCD_APP}"
      
      - name: 🔄 Waiting for Hub Operators deployment, Monitoring the progress of the deployment and approving InstallPlans
        run: |
          sudo python3 "${REPO_PATH}/monitoring/cluster_monitor.py" --kubeconfig "${KUBECONFIG_PATH}" --installplan --stable-for 600
          echo "✅ Hub Operators deployment completed successfully"
      
      # https://docs.redhat.com/en/documentation/openshift_container_platform/4.22/html/nodes/working-with-nodes
      - name: The compact cluster finished
        run: sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" get nodes

  scale-up-hub:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 90
    needs: build-hub
    env:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REPO_PATH: ${{ github.workspace }}
      
    steps:
      # Reuse the same workspace as build-hub (do not run checkout here — checkout clean removes gitignored dirs like bin/ and breaks ./bin/oc).
      - name: Fix workspace ownership (reuse build-hub artifacts)
        run: sudo chown -R "$(whoami):$(whoami)" "${GITHUB_WORKSPACE}/"

      - name: Expand the cluster with 2 additional nodes
        run: | 
          echo | openssl s_client -connect infra.5g-deployment.lab:8443 -servername infra.5g-deployment.lab 2>/dev/null | openssl x509 -outform PEM -out cert.pem
          sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" adm node-image create nodes-config.yaml --registry-config=/root/.docker/config.json --certificate-authority=./cert.pem

      - name: Copy the node.x86_64.iso to remove hypervisor
        run: sudo scp -r node.x86_64.iso root@INBACRNRDL0103:/opt/

      # MACs / IPs match dnsmasq hub.ipv4: 01:04→.23 (worker-0), 01:05→.24 (worker-1); names match nodes-config.yaml
      - name: 🖥️ Create Hub worker VMs 
        run: |
          sudo ssh root@INBACRNRDL0103 bash -s << 'ENDSSH'
          w=0
          for i in 4 5; do
            MAC="aa:aa:aa:aa:01:0${i}"
            UUID="aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaa010${i}"
            sudo kcli create vm \
              -P start=True -P uefi_legacy=true -P plan=hub \
              -P memory=71680 -P numcpus=40 -P disks=[200,50,250] \
              -P nets="[{'name': 'br0', 'mac': '$MAC'}]" \
              -P uuid="$UUID" \
              -P name="hub-worker-${w}" \
              -P iso=/opt/node.x86_64.iso
            w=$((w + 1))
          done
          ENDSSH

      - name: Monitor Hub worker deployment and approve certificates (parallel)
        run: |
          sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" adm node-image monitor --ip-addresses "172.16.30.23","172.16.30.24" &
          MONITOR_PID=$!
          while kill -0 $MONITOR_PID 2>/dev/null; do
            sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" get csr -o json | jq -r '.items[] | select(.status.conditions == null) | .metadata.name' | xargs -r sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" adm certificate approve 2>/dev/null || true
            sleep 15
          done
          wait $MONITOR_PID

      - name: Get all the nodes in the cluster
        run: sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" get nodes

      - name: Label dedicated worker nodes for OpenShift Storage (ODF)
        run: |
          # Workers with worker role but not control-plane (excludes compact ctlplane nodes)
          sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" label nodes \
            -l 'node-role.kubernetes.io/worker,!node-role.kubernetes.io/control-plane' \
            cluster.ocs.openshift.io/openshift-storage= --overwrite

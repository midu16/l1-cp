name: Deploy Hub Cluster

permissions:
  contents: read

concurrency:
  group: deploy-l1-cp-hub
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      ocp_version:
        description: "OpenShift version (e.g., 4.18.27)"
        required: true
        default: "4.18.27"
      registry_url:
        description: "AirGapped Registry URL"
        required: true
        default: "infra.5g-deployment.lab:8443"
      remote_host:
        description: "Remote host for seed VM (optional)"
        required: false
        default: ""
      vm_name:
        description: "Seed VM name (optional)"
        required: false
        default: "sno1"
      argocd_app: 
        description: "ArgoCD application name (e.g., rds-hub-operators-argoapps.yaml)"
        required: true
        default: "rds-hub-operators-argoapps.yaml"

defaults:
  run:
    shell: bash

env:
  # Opt into Node.js 24 for JavaScript actions (e.g. actions/checkout@v4); avoids Node 20 deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OCP_VERSION: ${{ github.event.inputs.ocp_version }}
  REGISTRY_URL: ${{ github.event.inputs.registry_url }}
  REMOTE_HOST: ${{ github.event.inputs.remote_host }}
  VM_NAME: ${{ github.event.inputs.vm_name }}
  KUBECONFIG_PATH: ${{ github.workspace }}/hub/auth/kubeconfig
  ARGOCD_APP: ${{ github.event.inputs.argocd_app }}
  
jobs:

  clean-hub:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    env:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

    steps:
      - name: 🧹 Fix workspace ownership (prevents EACCES)
        run: |
          sudo chown -R $(whoami):$(whoami) "${GITHUB_WORKSPACE}/"

      - uses: actions/checkout@v6
        with:
          repository: midu16/l1-cp
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: true
          persist-credentials: true
          fetch-depth: 1
          fetch-tags: false
          submodules: false
          lfs: false
          set-safe-directory: true

      - name: 🧹 Safe workspace cleanup (extra precaution)
        run: |
          git -C "${GITHUB_WORKSPACE}/l1-cp" reset --hard || true
          git -C "${GITHUB_WORKSPACE}/l1-cp" clean -fdx || true

      - name: 🗑️ Clean up previous RHACM Virtual Hub
        run: |
          if sudo kcli list plan | grep "hub "; then
            sudo kcli delete plan hub -y
            sudo root@INBACRNRDL0103 'sudo kcli delete plan hub -y'
          else
            echo "Plan hub does not exist — skipping deletion."
          fi

      - name: 🗑️ Clean up old registry content
        run: sudo rm -rf /home/registry/data/docker || true

      - name: 🗑️ Clean oc-mirror cache
        run: sudo rm -rf /root/.oc-mirror/.cache || true

      - name: 🗑️ Clean podman unused images
        run: sudo podman system prune -a || true

      - name: 🔄 Restart podman-registry
        run: |
          sudo systemctl restart podman-registry.service
          sudo systemctl status podman-registry.service || true

      - name: 🧹 Remove remote Seed VM (if provided)
        if: env.REMOTE_HOST != ''
        run: |
          REMOTE="${REMOTE_HOST}"
          VM="${VM_NAME}"
          SSH_TIMEOUT=30

          echo "Cleaning Seed VM: $VM on $REMOTE"

          if ! timeout $SSH_TIMEOUT ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$REMOTE" true 2>/dev/null; then
            echo "⚠️ Could not SSH to $REMOTE — skipping VM cleanup"
            exit 0
          fi

          if ssh "$REMOTE" "kcli list vm | grep -q '^$VM'"; then
            echo "Deleting VM $VM ..."
            ssh "$REMOTE" "kcli delete vm $VM -y" || true
          else
            echo "ℹ️ VM $VM not found on remote host"
          fi

  build-hub:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 180
    needs: clean-hub
    env:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REPO_PATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v6

      - name: 📥 Download OCP tools
        run: sudo make download-oc-tools VERSION="${OCP_VERSION}"

      - name: 📝 Render imageset-config.yml
        run: |
          # Extract major.minor from OCP_VERSION (e.g., 4.18.27 -> 4.18)
          OCP_MAJOR_MINOR="${OCP_VERSION%.*}"
          export SOURCE_INDEX="registry.redhat.io/redhat/redhat-operator-index:v${OCP_MAJOR_MINOR}"
          echo "Using SOURCE_INDEX: ${SOURCE_INDEX}"
          sudo -E make imageset-config.yml OCP_VERSION="${OCP_VERSION}" SOURCE_INDEX="${SOURCE_INDEX}"

      - name: 🔍 Validate AirGapped registry catalog
        run: |
          curl -sk -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
            "https://${REGISTRY_URL}/v2/_catalog" | jq . || echo "⚠️ Registry check failed"

      - name: ⚙️ Prepare install-config
        run: |
          sudo make fetch-certificate REGISTRY_URL="${REGISTRY_URL}"
          sudo make registry-pull-secret USERNAME="${REGISTRY_USERNAME}" PASSWORD="${REGISTRY_PASSWORD}" REGISTRY_URL="${REGISTRY_URL}"
          sudo make update-sshkey SSHKEY_FILE="/root/.ssh/id_rsa.pub"

      - name: 📦 Mirror images to AirGapped registry
        run: |
          max_attempts=5
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "::group::Mirror attempt $attempt of $max_attempts"
            if sudo DOCKER_CONFIG=/root/.docker ./bin/oc-mirror -c imageset-config.yml --v2 \
              --workspace file://hub-demo/ \
              docker://"${REGISTRY_URL}"/hub-demo \
              --max-nested-paths 10 --parallel-images 10 --parallel-layers 10 \
              --dest-tls-verify=false --log-level debug; then
              echo "::endgroup::"
              echo "Mirror completed successfully on attempt $attempt."
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt/$max_attempts failed."
            if [ $attempt -lt $max_attempts ]; then
              echo "Retrying in 30 seconds..."
              sleep 30
            fi
            attempt=$((attempt + 1))
          done
          echo "Mirror failed after $max_attempts attempts."
          exit 1

      - name: 🔍 Verify AirGapped registry content after mirroring
        run: |
          curl -sk -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
              "https://${REGISTRY_URL}/v2/_catalog" | jq . || echo "⚠️ Registry check failed"

      - name: 🔧 Generate openshift-install binary
        run: sudo make generate-openshift-install \
          RELEASE_IMAGE="${REGISTRY_URL}/hub-demo/openshift/release-images:${OCP_VERSION}-x86_64"

      - name: 💿 Generate agent ISO
        run: sudo make create-agent-iso

      - name: 📤 Copy agent ISO to webcache
        run: |
          SRC=$(ls hub/agent*.iso | head -n1 || true)
          if [[ -z "$SRC" ]]; then
            echo "❌ No agent ISO found"; exit 1
          fi
          sudo cp "$SRC" /opt/webcache/data/agent.x86_64.iso
          echo "✅ Copied $SRC to /opt/webcache/data/"

      - name: 🖥️ Create Hub VMs
        run: |
          for i in 0 1 2; do
            MAC="aa:aa:aa:aa:01:0$((i+1))"
            UUID="aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaa010$((i+1))"
            sudo kcli create vm \
              -P start=True -P uefi_legacy=true -P plan=hub \
              -P memory=71680 -P numcpus=40 -P disks=[200,50,250] \
              -P nets="[{'name': 'br0', 'mac': '$MAC'}]" \
              -P uuid="$UUID" \
              -P name="hub-ctlplane-$i" \
              -P iso=/opt/webcache/data/agent.x86_64.iso
          done

      - name: ⏱️ Wait for installation to complete
        run: sudo ./bin/openshift-install --dir ./hub/ agent wait-for install-complete --log-level=info

      - name: ⏱️ Wait for Cluster Operators
        run: sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" wait --for=condition=Available clusteroperators --all --timeout=1800s

      - name: 🚨 Validate no degraded operators
        run: |
          degraded=$(sudo oc --kubeconfig="${KUBECONFIG_PATH}" get clusteroperators -o json | jq -r '.items[] | select(.status.conditions[] | select(.type=="Degraded" and .status=="True")) | .metadata.name')
          if [[ -n "$degraded" ]]; then
            echo "❌ Degraded operators detected: $degraded"
            exit 1
          fi
          echo "✅ No degraded Operators"

      - name: 📋 Print final Operator status
        run: sudo oc --kubeconfig="${KUBECONFIG_PATH}" get clusteroperators
      - name: 📋 Move kubeconfig to /root/.kcli/clusters/hub/auth/ path
        run: |
          sudo mkdir -p /root/.kcli/clusters/hub/auth/
          sudo rsync -a --inplace "${KUBECONFIG_PATH}" /root/.kcli/clusters/hub/auth/kubeconfig
      - name: ✅ Approve all InstallPlans
        run: |
          sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" get installplan -A -o json | \
            jq -r '.items[] | select(.spec.approved != true) | "\(.metadata.namespace) \(.metadata.name)"' | \
            while read -r ns name; do
              echo "Approving InstallPlan $name in namespace $ns"
              sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" -n "$ns" patch installplan "$name" --type merge -p '{"spec":{"approved":true}}'
            done
          echo "✅ InstallPlan approval complete"

      - name: 📋 Hub Argo Application
        run: |
          sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" apply -f "${REPO_PATH}/hub-config/${ARGOCD_APP}"
      
      - name: 🔄 Waiting for Hub Operators deployment, Monitoring the progress of the deployment and approving InstallPlans
        run: |
          sudo python3 "${REPO_PATH}/monitoring/cluster_monitor.py" --kubeconfig "${KUBECONFIG_PATH}" --installplan --stable-for 600
          echo "✅ Hub Operators deployment completed successfully"
      
      # https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/nodes/working-with-nodes
      - name: The compact cluster finished
        run: sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" get nodes

      - name: Expand the cluster with 2 additional nodes
        run: | 
          echo | openssl s_client -connect infra.5g-deployment.lab:8443 -servername infra.5g-deployment.lab 2>/dev/null | openssl x509 -outform PEM -out cert.pem
          sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" adm node-image create nodes-config.yaml --registry-config=/root/.docker/config.json --certificate-authority=./cert.pem
          sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}"

      - name: Copy the node.x86_64.iso to remove hypervisor
        run: scp -r node.x86_64.iso root@INBACRNRDL0103:/opt/

      - name: 🖥️ Create Hub worker VMs 
        run: ssh root@INBACRNRDL0103 bash -s << 'ENDSSH'
              for i in 3 4; do
                MAC="aa:aa:aa:aa:01:0$((i+1))"
                UUID="aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaa010$((i+1))"
                sudo kcli create vm \
                  -P start=True -P uefi_legacy=true -P plan=hub \
                  -P memory=71680 -P numcpus=40 -P disks=[200,50,250] \
                  -P nets="[{'name': 'br0', 'mac': '$MAC'}]" \
                  -P uuid="$UUID" \
                  -P name="hub-ctlplane-$i" \
                  -P iso=/opt/node.x86_64.iso
              done
              ENDSSH

      - name: Monitor the Hub worker deployment
        run: sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" adm node-image monitor --ip-addresses "172.16.30.23","172.16.30.24"

      - name: Approve all the pending certificates
        run: sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" get csr -o json | jq -r '.items[] | select(.status.conditions == null) | .metadata.name' | xargs -r oc --kubeconfig="${KUBECONFIG_PATH}"adm certificate approve

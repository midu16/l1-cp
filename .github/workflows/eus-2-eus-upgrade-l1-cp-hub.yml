name: EUS-2-EUS Upgrade L1 CP Hub Cluster

permissions:
  contents: read

concurrency:
  group: eus-2-eus-upgrade-l1-cp-hub
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      ocp_version_from:
        description: "OpenShift version from (e.g., 4.19.23 — use the cluster’s current z-stream before the 4.20 hop)"
        required: true
        default: "4.19.23"
      ocp_version_to:
        description: "OpenShift version to (e.g., 4.20.6 — target after EUS hop)"
        required: true
        default: "4.20.6"
      registry_url:
        description: "AirGapped Registry URL"
        required: true
        default: "infra.5g-deployment.lab:8443"
      remote_host:
        description: "Remote host for seed VM (optional)"
        required: false
        default: ""
      vm_name:
        description: "Seed VM name (optional)"
        required: false
        default: "sno1"
      argocd_app: 
        description: "ArgoCD application name (e.g., eus-2-eus-upgrade-l1-cp-hub-argoapps.yaml)"
        required: true
        default: "eus-2-eus-upgrade-l1-cp-hub-argoapps.yaml"
      day2-catalogsource:
        description: "Optional operator index image for imageset-config (overrides default registry.redhat.io/redhat/redhat-operator-index:v<major.minor>). Examples: registry.redhat.io/redhat/redhat-operator-index:v4.19 or quay.io/prega/prega-operator-index:v4.20.6"
        required: false
        type: string
        default: ""
defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OCP_VERSION_FROM: ${{ github.event.inputs.ocp_version_from }}
  OCP_VERSION_TO: ${{ github.event.inputs.ocp_version_to }}
  REGISTRY_URL: ${{ github.event.inputs.registry_url }}
  REMOTE_HOST: ${{ github.event.inputs.remote_host }}
  VM_NAME: ${{ github.event.inputs.vm_name }}
  KUBECONFIG_PATH: '/root/.kcli/clusters/hub/auth/kubeconfig'
  ARGOCD_APP: ${{ github.event.inputs.argocd_app }}
  
jobs:

  eus-2-eus-upgrade-l1-cp-hub:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 180
    env:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REPO_PATH: ${{ github.workspace }}

    steps:
      - name: 🔧 Fix workspace ownership (prevents EACCES on checkout/cleanup)
        run: |
          sudo chown -R $(whoami):$(whoami) "${GITHUB_WORKSPACE}"
          sudo rm -rf "${GITHUB_WORKSPACE}/hub-demo-"* "${GITHUB_WORKSPACE}/telco-reference" 2>/dev/null || true
          sudo rm -rf "${GITHUB_WORKSPACE}/.docker" 2>/dev/null || true

      - uses: actions/checkout@v6

      - name: 📥 Download OCP tools
        run: sudo make download-oc-tools VERSION="${OCP_VERSION_FROM}"

      - name: 📝 Render imageset-config.yml
        env:
          DAY2_CATALOGSOURCE: ${{ github.event.inputs['day2-catalogsource'] }}
        run: |
          if [[ -n "${DAY2_CATALOGSOURCE}" ]]; then
            export SOURCE_INDEX="${DAY2_CATALOGSOURCE}"
            echo "Using day2-catalogsource (SOURCE_INDEX): ${SOURCE_INDEX}"
          else
            # Extract major.minor (e.g., 4.19.23 -> 4.19, 4.20.6 -> 4.20)
            if [[ "${OCP_VERSION_FROM}" =~ ^([0-9]+\.[0-9]+) ]]; then
              OCP_MAJOR_MINOR="${BASH_REMATCH[1]}"
            else
              echo "::error::Invalid OCP_VERSION_FROM for major.minor: ${OCP_VERSION_FROM}"
              exit 1
            fi
            export SOURCE_INDEX="registry.redhat.io/redhat/redhat-operator-index:v${OCP_MAJOR_MINOR}"
            echo "Using default SOURCE_INDEX: ${SOURCE_INDEX}"
          fi
          sudo -E make imageset-config.yml OCP_VERSION="${OCP_VERSION_FROM}" SOURCE_INDEX="${SOURCE_INDEX}"

      - name: 🔍 Validate AirGapped registry catalog
        run: |
          curl -sk -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
            "https://${REGISTRY_URL}/v2/_catalog" | jq . || echo "⚠️ Registry check failed"

      - name: 📦 Mirror images to AirGapped registry
        run: |
          MIRROR_ID="${OCP_VERSION_FROM//./-}"
          MAX_ATTEMPTS=3
          DELAY=15
          attempt=1
          while true; do
            if sudo DOCKER_CONFIG=/root/.docker ./bin/oc-mirror -c imageset-config.yml --v2 \
              --workspace "file://hub-demo-${MIRROR_ID}/" \
              docker://"${REGISTRY_URL}/hub-demo-${MIRROR_ID}" \
              --max-nested-paths 10 --parallel-images 10 --parallel-layers 10 \
              --dest-tls-verify=false --log-level debug; then
              echo "✅ Mirror completed successfully on attempt $attempt"
              break
            fi
            if [[ $attempt -ge $MAX_ATTEMPTS ]]; then
              echo "❌ Mirror failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "⚠️ Mirror attempt $attempt failed. Retrying in ${DELAY}s..."
            sleep $DELAY
            attempt=$((attempt + 1))
          done

      - name: 🔍 Verify AirGapped registry content after mirroring
        run: |
          curl -sk -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
              "https://${REGISTRY_URL}/v2/_catalog" | jq . || echo "⚠️ Registry check failed"

      - name: Apply the upgrade CGU
        run: |
          git clone -b release-4.20 http://infra.5g-deployment.lab:3000/student/telco-reference.git
          sudo ./bin/oc --kubeconfig="${KUBECONFIG_PATH}" apply -f ./telco-reference/telco-hub/upgrade/${ARGOCD_APP}

      - name: 🔄 Waiting for Hub Operators upgrade, Monitoring the progress of the upgrade and approving InstallPlans
        run: |
          sudo python3 "${REPO_PATH}/monitoring/cluster_monitor.py" --kubeconfig "${KUBECONFIG_PATH}" --installplan --stable-for 600 --apiserver-metrics
          echo "✅ Hub Operators upgrade completed successfully"

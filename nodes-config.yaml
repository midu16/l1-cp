# Aligned with dnsmasq hub.ipv4 on INBACRNRDL0102 (e.g. /opt/dnsmasq/include.d/hub.ipv4):
#   dhcp-host=aa:aa:aa:aa:01:04,ocp-worker-0,172.16.30.23
#   dhcp-host=aa:aa:aa:aa:01:05,ocp-worker-1,172.16.30.24
# DNS / gateway: infra.5g-deployment.lab → 172.16.30.1 (host-record on dnsmasq)
hosts:
- hostname: hub-worker-0.hub.5g-deployment.lab
  interfaces:
    - name: enp1s0
      macAddress: aa:aa:aa:aa:01:04
  rootDeviceHints:
    deviceName: "/dev/vda"
  networkConfig:
    interfaces:
      - name: enp1s0
        type: ethernet
        state: up
        mac-address: aa:aa:aa:aa:01:04
        ipv4:
          enabled: true
          address:
            - ip: 172.16.30.23
              prefix-length: 24
          dhcp: false
        ipv6:
          enabled: false
      - name: br-ex
        type: linux-bridge
        state: up
        mtu: 1370
    dns-resolver:
      config:
        server:
          - 172.16.30.1
    routes:
      config:
        - destination: 0.0.0.0/0
          next-hop-address: 172.16.30.1
          next-hop-interface: enp1s0
          table-id: 254
- hostname: hub-worker-1.hub.5g-deployment.lab
  interfaces:
    - name: enp1s0
      macAddress: aa:aa:aa:aa:01:05
  rootDeviceHints:
    deviceName: "/dev/vda"
  networkConfig:
    interfaces:
      - name: enp1s0
        type: ethernet
        state: up
        mac-address: aa:aa:aa:aa:01:05
        ipv4:
          enabled: true
          address:
            - ip: 172.16.30.24
              prefix-length: 24
          dhcp: false
        ipv6:
          enabled: false
      - name: br-ex
        type: linux-bridge
        state: up
        mtu: 1370
    dns-resolver:
      config:
        server:
          - 172.16.30.1
    routes:
      config:
        - destination: 0.0.0.0/0
          next-hop-address: 172.16.30.1
          next-hop-interface: enp1s0
          table-id: 254

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rds-hub-operators-deployment
  namespace: openshift-gitops
spec:
  destination:
    name: ''
    namespace: ''
    server: 'https://kubernetes.default.svc'
  source:
    path: telco-hub/configuration/
    repoURL: 'http://infra.5g-deployment.lab:3000/student/telco-reference.git'
    targetRevision: release-4.22
  project: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    retry:
      backoff:
        duration: 5s
        factor: 1
        maxDuration: 3m0s
      limit: 1000
  ignoreDifferences:
  - group: operator.open-cluster-management.io
    kind: MultiClusterHub
    jqPathExpressions:
    - .spec.overrides
    - .spec.ingress
    - .spec.enableClusterBackup
    - .spec.localClusterName
    - .spec.separateCertificateManagement
    - .metadata.annotations
  - group: multicluster.openshift.io
    kind: MultiClusterEngine
    jqPathExpressions:
    - .spec.overrides
    - .spec.tolerations
    - .metadata.annotations
    - .metadata.labels
  - group: agent-install.openshift.io
    kind: AgentServiceConfig
    name: agent
    jqPathExpressions:
    - .metadata
    - .status
  - kind: Node
    jqPathExpressions:
    - .metadata.labels
    - .metadata.annotations
  - group: policy.open-cluster-management.io
    kind: Policy
    name: ztp-argocd-plugins-installer
    namespace: hub-policies
    jsonPointers:
    - /metadata/resourceVersion
    - /metadata/generation
    - /metadata/creationTimestamp
    - /metadata/uid
    jqPathExpressions:
    - .status
    - .metadata.annotations

---
# SelfNodeRemediationConfig configures the SNR agents running on all nodes
# (both worker and master MCPs). The agents monitor API server connectivity
# and use peer-to-peer health checking to determine if a node is truly
# unhealthy before self-remediating.
#
# Detection flow (worker and master MCPs):
#   1. Agent checks API server every apiCheckInterval (15s)
#   2. After maxApiErrorThreshold (3) consecutive failures (~45s),
#      the agent contacts peers
#   3. At least minPeersForRemediation (1) peer must confirm the node
#      is marked unhealthy via a SelfNodeRemediation CR
#   4. If confirmed, the agent triggers a watchdog reboot (/dev/watchdog)
#      or a software reboot as fallback
#   5. Healthy agents wait safeTimeToAssumeNodeRebootedSeconds (180s)
#      before recovering workloads from the failed node
#
# Quorum safety is enforced at the NHC layer (99_06_nhc.yaml), not here:
#   - Worker MCP:  minHealthy=51% (at least 1 of 2 workers must be healthy)
#   - Master MCP:  maxUnhealthy=2  (at least 1 of 3 masters for etcd reads)
apiVersion: self-node-remediation.medik8s.io/v1alpha1
kind: SelfNodeRemediationConfig
metadata:
  name: self-node-remediation-config
  namespace: openshift-workload-availability
spec:
  apiCheckInterval: 15s
  apiServerTimeout: 5s
  maxApiErrorThreshold: 3
  minPeersForRemediation: 1
  peerApiServerTimeout: 5s
  peerDialTimeout: 5s
  peerRequestTimeout: 7s
  peerUpdateInterval: 15m
  isSoftwareRebootEnabled: true
  safeTimeToAssumeNodeRebootedSeconds: 180
  watchdogFilePath: /dev/watchdog
  hostPort: 30001
---
# SelfNodeRemediationTemplate using the OutOfServiceTaint strategy.
# When an unhealthy worker node is detected, the SNR agent applies the
# well-known taint "node.kubernetes.io/out-of-service" which triggers
# automatic eviction of stateful pods and force-detach of their PVCs,
# allowing them to be reattached on a healthy node.
# Supported on OCP 4.13+ / k8s 1.26+.
apiVersion: self-node-remediation.medik8s.io/v1alpha1
kind: SelfNodeRemediationTemplate
metadata:
  name: self-node-remediation-outofservicetaint-strategy-template
  namespace: openshift-workload-availability
spec:
  template:
    spec:
      remediationStrategy: OutOfServiceTaint
